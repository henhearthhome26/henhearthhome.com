<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hen, Hearth, and Home — Coming Soon</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      text-align: center;
      padding: 24px;
    }

    /* Logo sizing: smaller on desktop, scales nicely on mobile */
    .logo {
      width: min(420px, 85vw);
      height: auto;
      display: block;
      margin: 0 auto 16px auto;
    }

    .coming-soon {
      font-size: clamp(18px, 3.5vw, 28px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #111;
      margin: 0;
    }

    .wrap {
    animation: fadeIn 1.2s ease-out forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }
    
  </style>
</head>

<body>
  <div class="wrap">
    <img class="logo" src="HHH Logo.jpg" alt="Hen Hearth Home logo" />
    <p class="coming-soon">Coming Soon!</p>
  </div>
</body>
</html>
