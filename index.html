<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hen, Hearth, and Home — Coming Soon</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      text-align: center;
      padding: 24px;
    }

    @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0)
    }
  }
    
    /* Logo sizing: smaller on desktop, scales nicely on mobile */
    .logo {
      width: 600px;
      max-width: 92vw;
      height: auto;
      display: block;
      margin: 0 auto 22px auto;
      opacity: 0;
      animation: fadeUp 2.4s ease-out forwards;
    }

    .coming-soon {
      font-size: clamp(16px, 2.8vw, 22px);
      letter-spacing: 0.16em;
      font-weight: 400;
      text-transform: uppercase;
      color: #333333;
      margin: 0;
      opacity: 0;
      animation: fadeUp 2.4s ease-out forwards;
      animation-delay: 1.4s;
    }
    
  </style>
</head>

<body>
  <div class="wrap">
    <img class="logo" src="HHH Logo.jpg" alt="Hen Hearth Home logo" />
    <p class="coming-soon">Coming Soon!</p>
  </div>
</body>
</html>
